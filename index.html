<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Town</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #hud { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; color: #fff; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
  #hud span { background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; }
  #minimap { position: fixed; bottom: 10px; right: 10px; border: 2px solid rgba(255,255,255,0.4); border-radius: 4px; background: rgba(0,0,0,0.5); z-index: 10; }
  #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #FFD700; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20; }
</style>
</head>
<body>
<div id="hud">
  <span>⭐ <span id="stars">0</span></span>
  <span>🚴 <span id="speed">0</span> km/h</span>
</div>
<canvas id="game"></canvas>
<canvas id="minimap" width="120" height="120"></canvas>
<div id="msg" id="msg"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');
const msg = document.getElementById('msg');

const W = 1600, H = 1600;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// World state
const TILE = 80;
const keys = {};
let stars = 0;
let trail = [];
let msgTimer = 0;

// Bike physics
const bike = {
  x: W/2, y: H/2,
  vx: 0, vy: 0,
  angle: 0,
  speed: 0,
  wheelAngle: 0,
  lean: 0,
};

// Town layout: roads run along multiples of TILE*3
// Buildings fill the blocks between roads
const ROAD_WIDTH = 80;
const BLOCK = 3; // tiles per block

// Road grid lines (x and y positions of road centers)
const roadX = [160, 400, 640, 880, 1120, 1360];
const roadY = [160, 400, 640, 880, 1120, 1360];

// Buildings
const buildings = [
  { x: 200, y: 200, w: 160, h: 140, color: '#c0392b', emoji: '🏪', label: 'Shop' },
  { x: 460, y: 200, w: 140, h: 160, color: '#8e44ad', emoji: '🏠', label: 'House' },
  { x: 200, y: 460, w: 180, h: 120, color: '#2980b9', emoji: '🏥', label: 'Clinic' },
  { x: 700, y: 200, w: 140, h: 140, color: '#27ae60', emoji: '🌳', label: 'Park' },
  { x: 700, y: 460, w: 160, h: 160, color: '#f39c12', emoji: '🍕', label: 'Pizza' },
  { x: 460, y: 460, w: 160, h: 140, color: '#1abc9c', emoji: '📚', label: 'Library' },
  { x: 940, y: 200, w: 160, h: 160, color: '#e67e22', emoji: '🏫', label: 'School' },
  { x: 940, y: 460, w: 140, h: 140, color: '#3498db', emoji: '🏊', label: 'Pool' },
  { x: 1180, y: 200, w: 160, h: 140, color: '#9b59b6', emoji: '🎮', label: 'Arcade' },
  { x: 1180, y: 460, w: 140, h: 160, color: '#e74c3c', emoji: '🍦', label: 'Ice Cream' },
  { x: 200, y: 700, w: 140, h: 160, color: '#16a085', emoji: '🚒', label: 'Fire Stn' },
  { x: 460, y: 700, w: 160, h: 140, color: '#d35400', emoji: '🏦', label: 'Bank' },
  { x: 700, y: 700, w: 160, h: 160, color: '#8e44ad', emoji: '🎸', label: 'Music' },
  { x: 940, y: 700, w: 140, h: 140, color: '#27ae60', emoji: '🌸', label: 'Garden' },
  { x: 1180, y: 700, w: 160, h: 140, color: '#2c3e50', emoji: '🔭', label: 'Science' },
  { x: 200, y: 940, w: 160, h: 160, color: '#c0392b', emoji: '🎨', label: 'Art' },
  { x: 460, y: 940, w: 140, h: 140, color: '#f39c12', emoji: '🍔', label: 'Burgers' },
  { x: 700, y: 940, w: 160, h: 140, color: '#1abc9c', emoji: '🏋️', label: 'Gym' },
  { x: 940, y: 940, w: 140, h: 160, color: '#3498db', emoji: '🎭', label: 'Theater' },
  { x: 1180, y: 940, w: 160, h: 160, color: '#e67e22', emoji: '🐾', label: 'Pet Shop' },
  { x: 200, y: 1180, w: 140, h: 140, color: '#8e44ad', emoji: '💈', label: 'Barber' },
  { x: 460, y: 1180, w: 160, h: 160, color: '#16a085', emoji: '📷', label: 'Photo' },
  { x: 700, y: 1180, w: 140, h: 140, color: '#d35400', emoji: '🎪', label: 'Circus' },
  { x: 940, y: 1180, w: 160, h: 140, color: '#27ae60', emoji: '🌮', label: 'Tacos' },
  { x: 1180, y: 1180, w: 140, h: 160, color: '#c0392b', emoji: '🚀', label: 'Museum' },
];

// Stars
function makeStars() {
  const s = [];
  const positions = [
    [300,300],[540,300],[780,300],[1020,300],[1260,300],
    [300,540],[540,540],[780,540],[1020,540],[1260,540],
    [300,780],[540,780],[780,780],[1020,780],[1260,780],
    [300,1020],[540,1020],[780,1020],[1020,1020],[1260,1020],
    [300,1260],[540,1260],[780,1260],[1020,1260],[1260,1260],
  ];
  for (const [x,y] of positions) s.push({ x, y, collected: false, bob: Math.random()*Math.PI*2 });
  return s;
}
let starObjs = makeStars();

// Input
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch / on-screen controls for iPad
let touchDir = { up: false, down: false, left: false, right: false };
function addTouchBtn(label, x, y, dir) {
  const btn = document.createElement('div');
  btn.textContent = label;
  btn.style.cssText = `position:fixed;${y < 50 ? 'bottom:' + (100-y) : 'bottom:' + y}px;${x < 50 ? 'left:' + x : 'right:' + (100-x)}px;
    width:60px;height:60px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;
    align-items:center;justify-content:center;font-size:24px;user-select:none;touch-action:none;z-index:30;
    border:2px solid rgba(255,255,255,0.4);`;
  btn.addEventListener('touchstart', e => { touchDir[dir]=true; e.preventDefault(); }, {passive:false});
  btn.addEventListener('touchend', e => { touchDir[dir]=false; e.preventDefault(); }, {passive:false});
  document.body.appendChild(btn);
}
if ('ontouchstart' in window) {
  addTouchBtn('⬆️', 50, 160, 'up');
  addTouchBtn('⬇️', 50, 80, 'down');
  addTouchBtn('⬅️', 15, 120, 'left');
  addTouchBtn('➡️', 85, 120, 'right');
}

function isOnRoad(x, y) {
  for (const rx of roadX) if (Math.abs(x - rx) < ROAD_WIDTH/2) return true;
  for (const ry of roadY) if (Math.abs(y - ry) < ROAD_WIDTH/2) return true;
  return false;
}

function collidesBuilding(x, y, r) {
  for (const b of buildings) {
    if (x+r > b.x && x-r < b.x+b.w && y+r > b.y && y-r < b.y+b.h) return true;
  }
  if (x < 20 || x > W-20 || y < 20 || y > H-20) return true;
  return false;
}

function showMsg(text) {
  msg.textContent = text;
  msg.style.opacity = '1';
  msgTimer = 90;
}

// Drawing helpers
function drawRoad() {
  // grass background
  ctx.fillStyle = '#4a7c59';
  ctx.fillRect(0, 0, W, H);

  // road surfaces
  ctx.fillStyle = '#555';
  for (const rx of roadX) ctx.fillRect(rx - ROAD_WIDTH/2, 0, ROAD_WIDTH, H);
  for (const ry of roadY) ctx.fillRect(0, ry - ROAD_WIDTH/2, W, ROAD_WIDTH);

  // road markings
  ctx.setLineDash([30, 20]);
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#FFD700';
  for (const rx of roadX) {
    ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, H); ctx.stroke();
  }
  for (const ry of roadY) {
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry); ctx.stroke();
  }
  ctx.setLineDash([]);

  // crosswalks at intersections
  ctx.fillStyle = '#fff';
  for (const rx of roadX) {
    for (const ry of roadY) {
      for (let i = -3; i <= 3; i++) {
        ctx.fillRect(rx - ROAD_WIDTH/2 + 4, ry + i*10 - 3, ROAD_WIDTH - 8, 5);
        ctx.fillRect(rx + i*10 - 3, ry - ROAD_WIDTH/2 + 4, 5, ROAD_WIDTH - 8);
      }
    }
  }
}

function drawBuildings() {
  for (const b of buildings) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(b.x+6, b.y+6, b.w, b.h);
    // body
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // roof highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x, b.y, b.w, 12);
    // door
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(b.x + b.w/2 - 12, b.y + b.h - 28, 24, 28);
    // emoji
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.fillText(b.emoji, b.x + b.w/2, b.y + b.h/2);
    // label
    ctx.font = 'bold 11px Courier New';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(b.label, b.x + b.w/2, b.y + b.h - 35);
  }
}

function drawStars(t) {
  for (const s of starObjs) {
    if (s.collected) continue;
    s.bob += 0.04;
    const bobY = Math.sin(s.bob) * 4;
    ctx.save();
    ctx.translate(s.x, s.y + bobY);
    // glow
    const g = ctx.createRadialGradient(0,0,2,0,0,20);
    g.addColorStop(0, 'rgba(255,220,0,0.8)');
    g.addColorStop(1, 'rgba(255,220,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', 0, 0);
    ctx.restore();
  }
}

function drawTrail() {
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.5;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI*2);
    ctx.fillStyle = `rgba(100,180,255,${alpha})`;
    ctx.fill();
  }
}

function drawBike() {
  ctx.save();
  ctx.translate(bike.x, bike.y);
  ctx.rotate(bike.angle);

  const spd = bike.speed;

  // Shadow
  ctx.save();
  ctx.scale(1, 0.4);
  ctx.translate(4, 10);
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 8, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  ctx.restore();

  // Rear wheel
  bike.wheelAngle += spd * 0.05;
  ctx.save();
  ctx.translate(0, 12);
  ctx.rotate(bike.wheelAngle);
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2);
  ctx.fillStyle = '#222'; ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.moveTo(0,-10); ctx.lineTo(0,10);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  // Front wheel
  ctx.save();
  ctx.translate(0, -12);
  ctx.rotate(bike.wheelAngle);
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2);
  ctx.fillStyle = '#222'; ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.moveTo(0,-10); ctx.lineTo(0,10);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  // Frame
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 12); ctx.lineTo(0, -12);
  ctx.moveTo(0, 0); ctx.lineTo(-8, -8);
  ctx.moveTo(0, 0); ctx.lineTo(8, -8);
  ctx.stroke();

  // Handlebars
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-10, -10); ctx.lineTo(10, -10);
  ctx.stroke();

  // Rider body
  ctx.fillStyle = '#3498db';
  ctx.beginPath();
  ctx.ellipse(0, -4, 8, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f5cba7';
  ctx.beginPath();
  ctx.arc(0, -20, 7, 0, Math.PI*2);
  ctx.fill();

  // Gold helmet
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(0, -22, 8, Math.PI, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.rect(-9, -22, 18, 4);
  ctx.fill();

  // Speed lines when fast
  if (spd > 3) {
    ctx.strokeStyle = `rgba(255,255,255,${Math.min((spd-3)/5, 0.6)})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const ox = (Math.random()-0.5)*10;
      ctx.beginPath();
      ctx.moveTo(ox, 20 + i*6);
      ctx.lineTo(ox, 20 + i*6 + 15);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawMinimap() {
  const scale = 120 / W;
  mctx.fillStyle = '#4a7c59';
  mctx.fillRect(0, 0, 120, 120);
  mctx.fillStyle = '#555';
  for (const rx of roadX) mctx.fillRect((rx-ROAD_WIDTH/2)*scale, 0, ROAD_WIDTH*scale, 120);
  for (const ry of roadY) mctx.fillRect(0, (ry-ROAD_WIDTH/2)*scale, 120, ROAD_WIDTH*scale);
  mctx.fillStyle = '#FFD700';
  for (const s of starObjs) {
    if (!s.collected) { mctx.fillRect(s.x*scale-2, s.y*scale-2, 4, 4); }
  }
  mctx.fillStyle = '#fff';
  mctx.beginPath();
  mctx.arc(bike.x*scale, bike.y*scale, 3, 0, Math.PI*2);
  mctx.fill();
}

let lastTime = 0;
function update(dt) {
  const up = keys['ArrowUp'] || keys['w'] || keys['W'] || touchDir.up;
  const down = keys['ArrowDown'] || keys['s'] || keys['S'] || touchDir.down;
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'] || touchDir.left;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || touchDir.right;

  const onRoad = isOnRoad(bike.x, bike.y);
  const friction = onRoad ? 0.96 : 0.88;
  const accel = onRoad ? 0.4 : 0.15;
  const turnSpeed = onRoad ? 0.04 : 0.03;

  if (up) bike.speed = Math.min(bike.speed + accel, onRoad ? 9 : 4);
  if (down) bike.speed = Math.max(bike.speed - accel*1.5, -3);
  if (!up && !down) bike.speed *= 0.96;

  if (Math.abs(bike.speed) > 0.2) {
    if (left) bike.angle -= turnSpeed * (bike.speed > 0 ? 1 : -1);
    if (right) bike.angle += turnSpeed * (bike.speed > 0 ? 1 : -1);
  }

  const nx = bike.x + Math.sin(bike.angle) * bike.speed;
  const ny = bike.y - Math.cos(bike.angle) * bike.speed;

  if (!collidesBuilding(nx, ny, 14)) {
    bike.x = nx; bike.y = ny;
  } else {
    bike.speed *= -0.3;
  }

  bike.vx = Math.sin(bike.angle) * bike.speed;
  bike.vy = -Math.cos(bike.angle) * bike.speed;

  // trail
  if (Math.abs(bike.speed) > 0.5) {
    trail.push({ x: bike.x, y: bike.y });
    if (trail.length > 40) trail.shift();
  } else {
    if (trail.length > 0) trail.shift();
  }

  // star collection
  for (const s of starObjs) {
    if (!s.collected && Math.hypot(bike.x - s.x, bike.y - s.y) < 22) {
      s.collected = true;
      stars++;
      document.getElementById('stars').textContent = stars;
      showMsg('⭐ Star!');
      if (starObjs.every(s => s.collected)) {
        showMsg('🎉 All stars! Amazing!');
        setTimeout(() => { starObjs = makeStars(); stars = 0; document.getElementById('stars').textContent = 0; }, 2000);
      }
    }
  }

  document.getElementById('speed').textContent = Math.abs(Math.round(bike.speed * 8));

  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer === 0) msg.style.opacity = '0';
  }
}

function render(t) {
  const dt = Math.min((t - lastTime) / 16.67, 3);
  lastTime = t;

  update(dt);

  // Camera: center on bike
  const camX = Math.max(0, Math.min(bike.x - canvas.width/2, W - canvas.width));
  const camY = Math.max(0, Math.min(bike.y - canvas.height/2, H - canvas.height));

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(-camX, -camY);

  drawRoad();
  drawBuildings();
  drawTrail();
  drawStars(t);
  drawBike();

  ctx.restore();
  drawMinimap();

  requestAnimationFrame(render);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

requestAnimationFrame(render);
</script>
</body>
</html>
